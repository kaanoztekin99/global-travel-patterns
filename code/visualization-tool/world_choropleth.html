<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>D3 Choropleth Demo</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7f7;
    }

    .title {
      text-align: center;
      padding: 16px;
      font-size: 24px;
      font-weight: bold;
    }

    svg {
      display: block;
      margin: 0 auto;
      background: white;
    }

    .country {
      stroke: #666;
      stroke-width: 0.5px;
      cursor: pointer;
    }

    .country:hover {
      stroke: black;
      stroke-width: 1px;
    }

    .label {
      font-size: 7px;
      fill: #222;
      text-anchor: middle;
      pointer-events: none;
    }

    .tooltip {
      position: absolute;
      background: rgba(0, 0, 0, 0.85);
      color: white;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      pointer-events: none;
      opacity: 0;
    }

    .legend text {
      font-size: 12px;
      fill: #222;
    }
  </style>
</head>
<body>
  <div class="title">D3 Country Choropleth Demo</div>
  <svg width="1200" height="700"></svg>
  <div class="tooltip"></div>

  <script>
    const width = 1200;
    const height = 700;

    const svg = d3.select("svg");
    const tooltip = d3.select(".tooltip");

    const projection = d3.geoNaturalEarth1()
      .scale(220)
      .translate([width / 2, height / 2 + 20]);

    const path = d3.geoPath().projection(projection);

    const color = d3.scaleSequential()
      .domain([40, 100])
      .interpolator(d3.interpolateTurbo);

    function getCountryName(props, i) {
      return (
        props.shapeName ||
        props.name ||
        props.NAME ||
        props.ADMIN ||
        props.admin ||
        `Country ${i + 1}`
      );
    }

    d3.json("../../data/geojson/countries.geojson").then(data => {
      data.features.forEach((feature, i) => {
        const props = feature.properties || (feature.properties = {});
        props.display_name = getCountryName(props, i);
        props.dummy_score = 40 + ((i * 7) % 61);
      });

      svg.selectAll(".country")
        .data(data.features)
        .join("path")
        .attr("class", "country")
        .attr("d", path)
        .attr("fill", d => color(d.properties.dummy_score))
        .attr("fill-opacity", 0.85)
        .on("mousemove", function(event, d) {
          tooltip
            .style("opacity", 1)
            .html(`
              <strong>${d.properties.display_name}</strong><br/>
              Dummy Score: ${d.properties.dummy_score}
            `)
            .style("left", (event.pageX + 12) + "px")
            .style("top", (event.pageY + 12) + "px");
        })
        .on("mouseleave", function() {
          tooltip.style("opacity", 0);
        });

      svg.selectAll(".label")
        .data(data.features)
        .join("text")
        .attr("class", "label")
        .attr("transform", d => {
          const c = path.centroid(d);
          return `translate(${c[0]},${c[1]})`;
        })
        .text(d => d.properties.display_name);

      // Legend
      const legendWidth = 220;
      const legendHeight = 14;
      const legendX = 40;
      const legendY = height - 60;

      const defs = svg.append("defs");
      const gradient = defs.append("linearGradient")
        .attr("id", "legend-gradient");

      d3.range(0, 1.01, 0.1).forEach(t => {
        gradient.append("stop")
          .attr("offset", `${t * 100}%`)
          .attr("stop-color", d3.interpolateTurbo(t));
      });

      svg.append("rect")
        .attr("x", legendX)
        .attr("y", legendY)
        .attr("width", legendWidth)
        .attr("height", legendHeight)
        .attr("fill", "url(#legend-gradient)");

      const legendScale = d3.scaleLinear()
        .domain([40, 100])
        .range([legendX, legendX + legendWidth]);

      const legendAxis = d3.axisBottom(legendScale)
        .ticks(5)
        .tickSize(6);

      svg.append("g")
        .attr("class", "legend")
        .attr("transform", `translate(0, ${legendY + legendHeight})`)
        .call(legendAxis);

      svg.append("text")
        .attr("x", legendX)
        .attr("y", legendY - 8)
        .text("Dummy Score")
        .style("font-size", "13px")
        .style("font-weight", "bold");
    });
  </script>
</body>
</html>
